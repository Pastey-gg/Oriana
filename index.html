<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pastey</title>
    <meta name="description" content="Create and share temporary code and text pastes." />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preload" href="/geist-v5-latin-regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/inter-v20-latin-regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <style>
      :root,
      [data-theme="light"] {
        --shell-primary-color: #0f172a;
        --shell-primary-bg: #f8fafc;
      }

      [data-theme="dark"] {
        --shell-primary-color: #f1f5f9;
        --shell-primary-bg: #13141c;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--shell-primary-color);
        background: var(--shell-primary-bg);
      }

      #app:empty {
        min-height: 100vh;
        background: var(--shell-primary-bg);
      }
    </style>
    <script>
      const themePreference = localStorage.getItem("theme") || "system";
      let theme = themePreference;

      if (themePreference === "system") {
        theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.setAttribute("data-theme-preference", themePreference);
      document.documentElement.style.colorScheme = theme;
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
